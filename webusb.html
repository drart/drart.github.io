<html>
    <head>
        <style>
            html {
                font-size: 16px;

            }
            .button {
                background-color: white; 
                border: 3px solid DeepSkyBlue;
            }
            div {
                padding: 15px 32px;
                margin: auto;
                text-align: center;
                text-decoration: none;
            }
        </style>
	<script src="serial.js"></script>
    </head>
    <body>
        <div id ="connect" class="button">Connect to Arduino</div>
        <div id ="sender" class="button">Ping Arduino</div>
        <script>
		(function(){
			
			var port;

			var connectbutton = document.getElementById("connect");
			var pingbutton= document.getElementById("sender");
			
			    function connect() {
			      port.connect().then(() => {
				console.log(port);
				connectbutton.textContent = 'Disconnect';
				port.onReceive = data => {
				  let textDecoder = new TextDecoder();
				}
				port.onReceiveError = error => {
				  console.log('Receive error: ' + error);
				};
			      }, error => {
				console.log('Connection error: ' + error);
			      });
			    };
				// requesting ports must be done through a user action
			    connectbutton.addEventListener('click', function() {
				console.log(port);
				console.log("the device is open: " +port.device_.opened);
			      if (port.device_.opened) {
				port.disconnect();
				connectbutton.textContent = 'Connect';
			      } else {
				serial.requestPort().then(selectedPort => {
				  port = selectedPort;
				  connect();
				}).catch(error => {
				  console.log('Connection error: ' + error);
				});
			      }
			    });

			    // on page start check to see if devices are already allowed
			    serial.getPorts().then(ports => {
			      if (ports.length == 0) {
				console.log('No devices found.');
			      } else {
				port = ports[0]; // connect to the first allowable port
				connect();
			      }
			    });

			sender.addEventListener('click', function(){
				if (port !== undefined){
					let textencoder = new TextEncoder();
					port.send(textencoder.encode('test'));	
				}	
			});
		})();
        </script>
    </body>
</html>
