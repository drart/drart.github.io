    <body>
        <script>
            function findMyos(){
            var ControlService = 'd5060001-a904-deb9-4748-2c7f4a124842';
            var FirmwareVersionCharacteristic = 'd5060201-a904-deb9-4748-2c7f4a124842';
            var MyoInfoCharacteristic = 'd5060101-a904-deb9-4748-2c7f4a124842';

            navigator.bluetooth.requestDevice({ filters: [{ services: [ControlService] }] })
            .then(device => device.gatt.connect())
            .then(server => server.getPrimaryService(ControlService))
            .then(service => service.getCharacteristic(FirmwareVersionCharacteristic)) 
            .then(characteristic => {
                  // Writing 1 is the signal to reset energy expended.
                    return characteristic.readValue();
             })
            .then(value => {
                var buf = new Uint8Array(value.buffer);
                var responsestring = String.fromCharCode.apply(String,buf);

                console.log('Firmware version: ' + responsestring);
                console.log('buffer : ' + buf);
            })
            .catch(error => { console.log(error); });


            }
        </script>
        <div class="button" onclick="findMyos()">Connect to Myo</div>
